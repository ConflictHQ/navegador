site_name: Navegador
site_url: https://navegador.dev
site_description: AST + knowledge graph context engine for AI coding agents
site_author: CONFLICT LLC
repo_url: https://github.com/ConflictHQ/navegador
repo_name: ConflictHQ/navegador

theme:
  name: material
  logo: assets/images/conflict-logo.svg
  favicon: assets/images/favicon.png
  font:
    text: Roboto
    code: Roboto Mono
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
    - header.autohide
  icon:
    repo: fontawesome/brands/github

extra_css:
  - assets/css/custom.css

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true
            show_root_heading: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quickstart.md
      - Configuration: getting-started/configuration.md
  - Guide:
      - Ingesting a Repo: guide/ingestion.md
      - Loading Context: guide/context-loading.md
      - Graph Queries: guide/graph-queries.md
      - MCP Integration: guide/mcp-integration.md
  - Architecture:
      - Overview: architecture/overview.md
      - Graph Schema: architecture/graph-schema.md
  - API Reference:
      - Ingestion: api/ingestion.md
      - Graph: api/graph.md
      - MCP Server: api/mcp.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ConflictHQ/navegador

copyright: Copyright &copy; 2026 CONFLICT LLC
